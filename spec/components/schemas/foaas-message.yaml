type: object
description: |
  The ancestral FOAAS wire format, preserved byte-for-byte in spirit:
  a `message` and a `subtitle`. Every consequence, no matter how severe,
  can be expressed in this form. That was FOAAS's great insight.
required:
  - message
  - subtitle
